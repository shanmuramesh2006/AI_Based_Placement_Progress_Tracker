spring.application.name=backend

# ---------- DATABASE ----------
spring.datasource.url=jdbc:h2:mem:placement_tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---------- HIBERNATE / JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ---------- SERVER ----------
server.port=8080

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5178,http://127.0.0.1:5178,http://localhost:5179,http://127.0.0.1:5179

# ---------- GEMINI ----------
gemini.api.key=
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
